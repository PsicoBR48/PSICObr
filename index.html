<!DOCTYPE html><html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PsicoBR — Links</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --accent: #e8d7c8;
      --glass: rgba(255,255,255,0.04);
      --container-width: 420px;
      --radius: 16px;
      font-family: 'Inter', system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    html, body {
      height: 100%;
      margin: 0;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #2a2a2a 100%);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: var(--container-width);
      text-align: center;
      padding: 40px 30px;
      box-sizing: border-box;
      background: rgba(15, 15, 15, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid rgba(232, 215, 200, 0.1);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
      animation: fadeIn 0.8s ease-out;
    }
    .avatar-wrap {
      width: 200px;
      height: 200px;
      margin: 0 auto 25px;
      border-radius: 50%;
      padding: 4px;
      background: linear-gradient(135deg, #e8d7c8, #9d7c5e, #5d4037);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
      overflow: hidden;
      animation: float 6s ease-in-out infinite;
    }
    .avatar {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
      background: #111;
      border: 3px solid #0a0a0a;
    }
    h1 {
      margin: 10px 0 15px;
      font-size: 26px;
      letter-spacing: 0.5px;
      color: var(--accent);
      font-weight: 700;
    }
    p.lead {
      margin: 0 0 25px;
      opacity: 0.9;
      font-size: 16px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border-radius: 14px;
      padding: 18px;
      background: transparent;
      color: var(--accent);
      border: 2px solid rgba(232, 215, 200, 0.25);
      width: 70px;
      height: 70px;
      box-sizing: border-box;
      transition: all 0.3s ease;
      margin-bottom: 15px;
      position: relative;
      overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(232, 215, 200, 0.1), transparent);
      transition: left 0.5s;
    }
    .btn:hover::before {
      left: 100%;
    }
    .btn:hover {
      box-shadow: 0 8px 25px rgba(232, 215, 200, 0.15);
      transform: translateY(-3px);
      background: rgba(232, 215, 200, 0.05);
      border-color: rgba(232, 215, 200, 0.4);
    }
    .btn:active {
      transform: translateY(0);
    }
    .discord-icon {
      width: 32px;
      height: 32px;
      filter: invert(89%) sepia(9%) saturate(459%) hue-rotate(338deg) brightness(92%) contrast(85%);
    }
    footer {
      margin-top: 30px;
      opacity: 0.6;
      font-size: 13px;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar-wrap">
      <img class="avatar" src="https://media1.tenor.com/m/u31W1dxQRrEAAAAC/ashley-graves-tcoaal.gif" alt="Avatar PsicoBR">
    </div>
    <h1>PsicoBR</h1>
    <p class="lead">Meu servidor do Discord 😈😈</p>

  </div>
</body>
</html>
